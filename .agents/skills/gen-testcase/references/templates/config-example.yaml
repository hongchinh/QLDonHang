mode: web                  # web | mobile — affects generated TC style
# Optional: ordered list of BD source files to merge during convert.
# Files are merged in list order into a single BD.md.
# Each path is relative to the module directory.
bd_files:
  - input/BD_Common.xlsx
  - input/BD_SCR167_A2_Create.xlsx
  - input/BD_SCR167_R2_Edit.xlsx

input_format: auto         # auto | xlsx | docx | pdf | md — auto-detect from file extension
