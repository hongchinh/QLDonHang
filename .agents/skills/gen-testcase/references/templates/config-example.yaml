  figma: ""
  jira:
    project: "HITOWA"
    tickets:
      - "HITOWA-421"
      - "HITOWA-422"
  screenshots:
    - input/screenshots/scr167-create-form.png
    - input/screenshots/scr167-edit-form.png

# Optional: semantic label of the grouping dimension used in this module.
# none | mode | role | service | phase
