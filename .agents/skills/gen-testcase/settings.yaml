  # Thresholds for BD content analysis
  field_label_max_length: 40        # Max chars for key-value field label detection
  key_value_section_threshold: 0.6  # Min ratio of qualifying rows for key-value classification
  section_summary_max_chars: 120    # Max chars for section summary text
  field_name_truncate_length: 60    # Max chars when extracting field names from table cells

# ---------------------------------------------------------------------------
# BD Conversion (convert-bd-to-md.py)
# ---------------------------------------------------------------------------
bd_conversion:
  key_value_max_cols: 3             # Max used columns for key_value classification
  data_table_min_cols: 4            # Min used columns for data_table classification
  min_rows_for_classification: 2    # Min rows to attempt section type classification
  key_value_qualifying_threshold: 0.6  # Min ratio of qualifying rows
  field_label_max_chars: 40         # Max chars for field label in key-value detection

# ---------------------------------------------------------------------------
# Generation Workflow Thresholds
# ---------------------------------------------------------------------------
generation:
  # BD.md line threshold — below this, skip bd-summary.json extraction
  bd_summary_min_lines: 200

  # Max BD items to qualify as "small screen" (single Write call allowed)
  small_screen_item_threshold: 15

  # Line count above which incremental write strategy is required
  large_output_line_threshold: 400

  # TC count above which a section should be split into sub-batches
  large_section_tc_threshold: 200

  # Batch size for writing large validation sections
  validation_section_batch_size: 50

  # Maximum clarification questions per generate run
  max_clarification_questions: 7

  # Default Function TC section structure
  function_sections:
    A.1: "Screen initialization"
    A.2: "Function flow"
    A.3: "Validation"

  # Default Function flow sub-subsections (under A.2)
  function_flow_subsections:
    A.2.1: "Create"
    A.2.2: "Update"
    A.2.3: "Delete"

  # Default Validation sub-subsections (under A.3)
  validation_subsections:
    A.3.1: "Required"
    A.3.2: "Maxlength"
    A.3.3: "Text"
    A.3.4: "Listbox"
    A.3.5: "Checkbox"
    A.3.6: "Calendar"
    A.3.7: "Timepicker"
    A.3.8: "Start/End time"

# ---------------------------------------------------------------------------
# Review Workflow Thresholds
# ---------------------------------------------------------------------------
review:
  # Light review conditions (ALL must be true to qualify)
  light_mode:
    bd_max_lines: 200
    bd_max_items: 15

  # Max re-review cycles before forcing export
  max_revert_cycles: 2

  # Duplicate detection scope
  duplicate_check_scope: "same_subsection"
