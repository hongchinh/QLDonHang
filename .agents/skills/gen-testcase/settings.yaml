# =============================================================================
# gen-testcase — Global Settings
# =============================================================================
# Skill-level defaults used by scripts and workflows. Per-module config.yaml
# can override some of these (e.g. export_column_map, export_sheets).
#
# To customize: edit values here. Changes take effect on the next run.
# =============================================================================

# ---------------------------------------------------------------------------
# XLSX Export Defaults
# ---------------------------------------------------------------------------
export:
  # Default column positions (1-based) per sheet type.
  # Per-module config.yaml `export_column_map` overrides these.
  column_defaults:
    gui:
      tc_id: 1
      precondition: 2
      title: 3
      steps: 4
      expected: 5
    function:
      tc_id: 1
      precondition: 2
      title: 3
      steps: 4
      expected: 5

  # Header text → field key mapping for auto-detecting columns from template
  header_texts:
    "TC ID": "tc_id"
    "Test Title/Summary of test cases": "title"
    "Pre-conditions": "precondition"
    "Test Steps": "steps"
    "Expected Result": "expected"

  # Default sheet names in the DJP xlsx template.
  # Per-module config.yaml `export_sheets` overrides these.
  sheet_names:
    cover: "Cover"
    changed_history: "Changed History"
    test_report: "Test Report"
    common: "Common"
    gui: "GUI"
    function: "FUNC"
    screen_layout: "Screen Layout"

  # Row number containing column headers in the xlsx template
  header_row: 5

  # Fallback max column count when worksheet reports None
  max_column_fallback: 17

  # Max columns to scan during header auto-detection
  max_column_scan: 20

  # Section detection in xlsx template
  section_detection:
    # Minimum column span for merged cell to be a section header
    merge_span_min: 10
    # Row range to scan for section headers (merged cell strategy)
    merged_scan_start: 6
    merged_scan_end: 15
    # Row range to scan for section headers (pattern strategy)
    pattern_scan_start: 5
    pattern_scan_end: 20
    # Window size after section header to find subsection/TC rows
    subsection_window: 6

  # Row range to scan for COUNTIF/COUNTA formulas to expand
  formula_scan_max_row: 4

  # Fallback section/subsection/TC row indices when detection fails
  fallback_rows:
    section: 7
    subsection: 8
    tc: 9

# ---------------------------------------------------------------------------
# TC ID Configuration
# ---------------------------------------------------------------------------
tc_id:
  prefixes:
    gui: "GUI_"
    function: "FUNC_"
    common: "Common_"

  # Default group code when no explicit groups exist
  default_group_code: "N/A"

# ---------------------------------------------------------------------------
# Test Environments
# ---------------------------------------------------------------------------
# Default test environments per mode. Used by export script to generate
# dynamic status columns in xlsx output.
#
# Resolution chain (export-tc-to-xlsx.py):
#   1. config.yaml `environments` list (if non-empty)
#   2. settings.environments.{mode} (e.g., mode=web → web list)
#   3. settings.environments.all (ultimate fallback)
#
# Each environment name becomes a status column header in Test Round blocks.
# Status values: Untested, OK, NG, N/A.
environments:
  web:
    - Chrome
    - Safari
  mobile:
    - IOS
    - Android
  all:
    - IOS/Chrome
    - Android/Safari

# ---------------------------------------------------------------------------
# Markdown Parsing Patterns (used by export script)
# ---------------------------------------------------------------------------
markdown_patterns:
  group: '^## Group:\s+(\S+)(?:\s*—\s*(.+?))?\s*$'
  section: '^## ([A-Z]\..*)'
  subsection: '^### \*{0,2}([A-Z](?:\.\d+)+)\s+(.+?)\*{0,2}\s*$'
  tc_id: '^### ((?:GUI_|FUNC_)?[A-Z](?:\.\d+)+_\d+)\s*$'
  precondition: '^> Pre-condition:\s*(.*)'
  field: '^- \*\*(\w+):\*\*\s*(.*)'
  template_section_id: '^[A-Z](?:\.\d+)+$'
  sheet_tc_id: '^(?:(?:GUI|FUNC|Common)_)?(?:[A-Z](?:\.\d+)+_\d+|\d+_\d+)$'
  # Used in xlsx template for detecting subsection/TC rows
  subsection_detect: '^(?:FUNC |GUI |Common )?[A-Z]\.\d+'
  tc_row_detect: '^(?:FUNC_|GUI_|Common_)[\w.]+_\d+'

